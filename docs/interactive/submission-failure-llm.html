<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unavailable Assistant</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="chat-full-page">
  <div id="chat-container" class="ai-chat">
    <div class="chat-header">Unavailable Assistant</div>
    <div id="responses" class="chat-messages chat-body">
      <div class="response bot-message">How can I help?</div>
    </div>
    <div class="chat-input-bar">
      <textarea id="prompt-input" data-testid="chat-input"
                placeholder="Ask me anything" rows="2"></textarea>
      <button id="send-btn" data-testid="send-button"
              aria-label="Send message">Send</button>
    </div>
  </div>
  <!-- The intentionally disconnected submit control models a broken chat UI. -->
</body>
</html>
